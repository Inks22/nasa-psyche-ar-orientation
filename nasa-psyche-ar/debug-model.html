<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/three@0.147.1/build/three.min.js"></script>
</head>
<body>
    <a-scene>
        <a-camera position="0 0 5"></a-camera>
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="2 4 3" intensity="1"></a-light>
        
        <!-- Origin marker -->
        <a-sphere position="0 0 0" radius="0.1" color="red"></a-sphere>
        
        <!-- Your asteroid at origin with scale 2.5 -->
        <a-entity id="asteroid" position="0 0 0" rotation="0 0 0">
            <a-gltf-model 
                id="model"
                src="./models/AsteroidPsyche.glb" 
                scale="2.5 2.5 2.5"
            ></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // Wait for model to load
        document.getElementById('model').addEventListener('model-loaded', () => {
            const entity = document.getElementById('asteroid');
            const model = entity.getObject3D('mesh');
            
            if (model) {
                // Calculate bounding box
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                const center = new THREE.Vector3();
                
                box.getSize(size);
                box.getCenter(center);
                
                console.log('\n' + '='.repeat(60));
                console.log('🪨 ASTEROID MODEL ANALYSIS');
                console.log('='.repeat(60));
                console.log('\n📦 BOUNDING BOX:');
                console.log(`  Min: (${box.min.x.toFixed(2)}, ${box.min.y.toFixed(2)}, ${box.min.z.toFixed(2)})`);
                console.log(`  Max: (${box.max.x.toFixed(2)}, ${box.max.y.toFixed(2)}, ${box.max.z.toFixed(2)})`);
                
                console.log('\n📏 DIMENSIONS:');
                console.log(`  Width (X):  ${size.x.toFixed(2)} units`);
                console.log(`  Height (Y): ${size.y.toFixed(2)} units`);
                console.log(`  Depth (Z):  ${size.z.toFixed(2)} units`);
                
                console.log('\n📍 CENTER OF GEOMETRY:');
                console.log(`  (${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)})`);
                
                console.log('\n🎯 KEY INFO:');
                console.log(`  Model placed at: (0, 0, 0)`);
                console.log(`  Scale applied: 2.5x`);
                console.log(`  Actual center: (${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)})`);
                
                if (Math.abs(center.x) > 0.1 || Math.abs(center.y) > 0.1 || Math.abs(center.z) > 0.1) {
                    console.log('\n⚠️  WARNING: Geometry is NOT centered at origin!');
                    console.log('   The model has an offset from its position.');
                } else {
                    console.log('\n✅ Geometry is centered at origin');
                }
                
                console.log('\n💡 SOLUTION:');
                console.log(`  To center the asteroid, offset the model by:`);
                console.log(`  Position: (${-center.x.toFixed(2)}, ${-center.y.toFixed(2)}, ${-center.z.toFixed(2)})`);
                
                console.log('\n' + '='.repeat(60) + '\n');
                
                // Add visual guides
                const scene = document.querySelector('a-scene');
                
                // Box helper at bounding box
                scene.insertAdjacentHTML('beforeend', `
                    <a-box 
                        position="${center.x} ${center.y} ${center.z}"
                        width="${size.x}" 
                        height="${size.y}" 
                        depth="${size.z}"
                        material="wireframe: true; color: yellow; opacity: 0.5"
                    ></a-box>
                `);
                
                // Sphere at geometry center
                scene.insertAdjacentHTML('beforeend', `
                    <a-sphere 
                        position="${center.x} ${center.y} ${center.z}"
                        radius="0.2" 
                        color="cyan"
                    ></a-sphere>
                `);
            }
        });
    </script>
</body>
</html>
